<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | User Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content" style="max-width: 800px;">

    <div style="width: 100%; display: flex; align-items: center; margin-bottom: 20px; padding: 0 10px;">
        <a href="dashboard.html" style="color: #00d2ff; text-decoration: none; font-family: 'Orbitron'; font-size: 12px;">
            <i class="fas fa-arrow-left"></i> BACK
        </a>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; text-align: left;">
        
        <div class="glass-panel" style="padding: 30px; max-width: 100%;">
            <div class="logo-circle" style="width: 120px; height: 120px; margin: 0 auto 20px; border-width: 3px; padding: 5px;">
                <img src="https://ui-avatars.com/api/?name=Ali+Ahmed&background=00d2ff&color=fff" style="width: 100%; border-radius: 50%;" alt="User">
            </div>
            <h2 style="color: #fff; font-family: 'Poppins'; font-size: 20px; text-align: center; margin-bottom: 5px;">Ali Ahmed</h2>
            <p style="color: #00d2ff; font-family: 'Orbitron'; font-size: 10px; text-align: center; letter-spacing: 1px;">GOLD MEMBER</p>
            
            <div class="glow-line"></div>

            <div style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span style="color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'Orbitron';">SERVICES</span>
                    <span style="color: #fff; font-size: 14px; font-family: 'Orbitron';">12</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <span style="color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'Orbitron';">RATING</span>
                    <span style="color: #ffcc00; font-size: 14px; font-family: 'Orbitron';">5.0 <i class="fas fa-star" style="font-size: 10px;"></i></span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: rgba(255,255,255,0.4); font-size: 11px; font-family: 'Orbitron';">SINCE</span>
                    <span style="color: #fff; font-size: 14px; font-family: 'Orbitron';">2024</span>
                </div>
            </div>

            <a href="login.html" style="display:block; width: 100%; margin-top: 30px; padding: 12px; border-radius: 12px; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.05); color: #ff4d4d; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; text-decoration:none; text-align:center; box-sizing:border-box;">
                LOGOUT
            </a>
        </div>

        <div class="glass-panel" style="padding: 30px; max-width: 100%;">
            <span class="badge">ACCOUNT SETTINGS</span>
            
            <form style="margin-top: 20px;">
                <div style="margin-bottom: 15px;">
                    <label style="color: rgba(255,255,255,0.5); font-size: 10px; font-family: 'Orbitron';">PHONE NUMBER</label>
                    <input type="text" value="+92 300 1234567" style="width:100%; margin-top: 5px; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; font-size: 14px; outline: none;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="color: rgba(255,255,255,0.5); font-size: 10px; font-family: 'Orbitron';">PRIMARY VEHICLE</label>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <input type="text" value="Honda Civic" style="flex: 2; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; font-size: 14px; outline: none;">
                        <input type="text" value="ABC-123" style="flex: 1; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; font-size: 14px; outline: none;">
                    </div>
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="color: rgba(255,255,255,0.5); font-size: 10px; font-family: 'Orbitron';">HOME ADDRESS</label>
                    <input type="text" placeholder="Set your default address" style="width:100%; margin-top: 5px; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; font-size: 14px; outline: none;">
                </div>

                <button type="button" style="width: 100%; padding: 14px; border-radius: 15px; border: none; background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: #fff; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px; cursor: pointer; font-weight: bold;">
                    SAVE CHANGES
                </button>
            </form>

            <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <p style="color: rgba(255,255,255,0.5); font-size: 10px; font-family: 'Orbitron'; margin-bottom: 15px;">QUICK LINKS</p>
                <div style="display: flex; gap: 15px; font-size: 18px; color: #00d2ff;">
                    <a href="history.html" style="color:#00d2ff;"><i class="fas fa-history" title="History"></i></a>
                    <a href="wallet.html" style="color:#00d2ff;"><i class="fas fa-wallet" title="Wallet"></i></a>
                    <a href="settings.html" style="color:#00d2ff;"><i class="fas fa-shield-alt" title="Privacy"></i></a>
                    <a href="notifications.html" style="color:#00d2ff;"><i class="fas fa-bell" title="Notifications"></i></a>
                    <a href="complaint.html" style="color:#00d2ff;"><i class="fas fa-headset" title="Support"></i></a>
                </div>
            </div>
        </div>
    </div>

  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | USER PROFILE MANAGEMENT
  </div>

</div>

</body>
</html>
