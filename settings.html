<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div style="width: 100%; max-width: 600px; display: flex; align-items: center; margin-bottom: 20px;">
        <a href="dashboard.html" style="color: #00d2ff; text-decoration: none; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px;">
            <i class="fas fa-chevron-left"></i> BACK
        </a>
    </div>

    <div class="glass-panel" style="max-width: 600px; padding: 40px; text-align: left;">

      <span class="badge">PREFERENCES</span>
      <h1 class="main-title" style="font-size: 32px;">App <span>Settings</span></h1>
      <div class="glow-line"></div>

      <div style="margin-top: 30px;">
          <p style="color: #00d2ff; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 1px; margin-bottom: 15px;">NOTIFICATIONS</p>
          
          <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
              <div>
                  <h4 style="color: #fff; font-family: 'Poppins'; margin: 0; font-size: 15px;">Push Notifications</h4>
                  <p style="color: rgba(255,255,255,0.4); font-size: 11px; margin: 0;">Service updates and arrival alerts</p>
              </div>
              <div style="width: 40px; height: 20px; background: #00d2ff; border-radius: 20px; position: relative; cursor: pointer;">
                  <div style="position: absolute; right: 3px; top: 3px; width: 14px; height: 14px; background: #fff; border-radius: 50%;"></div>
              </div>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
              <div>
                  <h4 style="color: #fff; font-family: 'Poppins'; margin: 0; font-size: 15px;">SMS Alerts</h4>
                  <p style="color: rgba(255,255,255,0.4); font-size: 11px; margin: 0;">Get bill details via SMS</p>
              </div>
              <div style="width: 40px; height: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; position: relative; cursor: pointer;">
                  <div style="position: absolute; left: 3px; top: 3px; width: 14px; height: 14px; background: rgba(255,255,255,0.3); border-radius: 50%;"></div>
              </div>
          </div>
      </div>

      <div style="margin-top: 30px;">
          <p style="color: #00d2ff; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 1px; margin-bottom: 15px;">SECURITY</p>
          
          <div style="display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;">
              <i class="fas fa-fingerprint" style="color: #fff; width: 20px;"></i>
              <h4 style="color: #fff; font-family: 'Poppins'; margin: 0; font-size: 15px; flex-grow: 1;">Biometric Login</h4>
              <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.2); font-size: 12px;"></i>
          </div>

          <div style="display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer;">
              <i class="fas fa-key" style="color: #fff; width: 20px;"></i>
              <h4 style="color: #fff; font-family: 'Poppins'; margin: 0; font-size: 15px; flex-grow: 1;">Change Password</h4>
              <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.2); font-size: 12px;"></i>
          </div>
      </div>

      <div style="margin-top: 30px;">
          <p style="color: #00d2ff; font-family: 'Orbitron'; font-size: 11px; letter-spacing: 1px; margin-bottom: 15px;">OTHERS</p>

          <a href="about.html" style="display: flex; align-items: center; gap: 15px; padding: 15px 0; cursor: pointer; text-decoration:none; border-bottom: 1px solid rgba(255,255,255,0.05);">
              <i class="fas fa-circle-info" style="color: #fff; width: 20px;"></i>
              <h4 style="color: #fff; font-family: 'Poppins'; margin: 0; font-size: 15px; flex-grow: 1;">About & Terms</h4>
              <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.2); font-size: 12px;"></i>
          </a>
          
          <a href="login.html" style="display: flex; align-items: center; gap: 15px; padding: 15px 0; cursor: pointer; text-decoration:none;">
              <i class="fas fa-trash-can" style="color: #ff4d4d; width: 20px;"></i>
              <h4 style="color: #ff4d4d; font-family: 'Poppins'; margin: 0; font-size: 15px; flex-grow: 1;">Delete Account</h4>
          </a>
      </div>

    </div>

  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | SYSTEM PREFERENCES V2.0
  </div>

</div>

</body>
</html>
