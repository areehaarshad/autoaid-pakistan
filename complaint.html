<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | Register Complaint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div style="width: 100%; max-width: 550px; display: flex; align-items: center; margin-bottom: 20px;">
        <a href="dashboard.html" style="color: #ff4d4d; text-decoration: none; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px;">
            <i class="fas fa-arrow-left"></i> BACK TO DASHBOARD
        </a>
    </div>

    <div class="glass-panel" style="max-width: 550px; border: 1px solid rgba(255, 77, 77, 0.2);">

      <span class="badge" style="background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border-color: rgba(255, 77, 77, 0.3);">
        SUPPORT CENTER
      </span>

      <h1 class="main-title" style="font-size: 28px;">Register <span>Complaint</span></h1>
      <div class="glow-line" style="background: linear-gradient(90deg, transparent, #ff4d4d, transparent);"></div>

      <p class="tagline">We are sorry you had a bad experience. Please let us know the details so we can fix it.</p>

      <form style="margin-top: 30px; text-align: left;">
          
          <div style="margin-bottom: 20px;">
              <label style="color: rgba(255,255,255,0.5); font-size: 11px; font-family: 'Orbitron'; margin-left: 5px;">ISSUE CATEGORY</label>
              <select style="width:100%; margin-top: 8px; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; outline:none; appearance: none;">
                  <option style="background: #111;">Behavioral Issue with Provider</option>
                  <option style="background: #111;">Overcharging / Payment Issue</option>
                  <option style="background: #111;">Poor Service Quality</option>
                  <option style="background: #111;">Delayed Arrival</option>
                  <option style="background: #111;">Other Technical Issue</option>
              </select>
          </div>

          <div style="margin-bottom: 20px;">
              <label style="color: rgba(255,255,255,0.5); font-size: 11px; font-family: 'Orbitron'; margin-left: 5px;">DETAILED DESCRIPTION</label>
              <textarea 
                placeholder="Explain what went wrong in detail..." 
                style="width: 100%; margin-top: 8px; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-family: 'Poppins'; font-size: 14px; outline: none; height: 120px; resize: none;"
              ></textarea>
          </div>

          <div style="margin-bottom: 25px;">
              <label style="color: rgba(255,255,255,0.5); font-size: 11px; font-family: 'Orbitron'; margin-left: 5px;">ATTACH EVIDENCE (Optional)</label>
              <div style="margin-top: 8px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#ff4d4d';">
                  <i class="fas fa-camera" style="color: rgba(255,255,255,0.3); font-size: 24px;"></i>
                  <p style="color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 10px; font-family: 'Poppins';">Upload Photos or Screenshots</p>
              </div>
          </div>

      </form>

      <a href="dashboard.html" style="display:block; width:100%; padding:16px; border-radius:20px; border:none; background:linear-gradient(90deg,#ff4d4d,#b30000); color:#fff; font-size:14px; letter-spacing:2px; font-family:'Orbitron',sans-serif; cursor:pointer; font-weight: bold; box-shadow: 0 10px 25px rgba(255,77,77,0.2); text-decoration:none; text-align:center; box-sizing:border-box;">
        SUBMIT COMPLAINT
      </a>

    </div>

  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | QUALITY ASSURANCE UNIT
  </div>

</div>

</body>
</html>
