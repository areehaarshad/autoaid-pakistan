<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div class="glass-panel" style="max-width: 500px; padding: 35px;">

      <span class="badge">FINAL INVOICE</span>
      <h1 class="main-title" style="font-size: 28px;">Complete <span>Payment</span></h1>
      <div class="glow-line"></div>

          </div>

          <div style="display: flex; justify-content: space-between;">

      <div style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          
          <label style="display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#00d2ff';">
              <input type="radio" name="pay" style="display:none;">
              <i class="fas fa-wallet" style="color: #00ff88; font-size: 20px; margin-bottom: 8px;"></i>
              <span style="color: #fff; font-size: 11px; font-family: 'Poppins';">EasyPaisa</span>
          </label>

          <label style="display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#00d2ff';">
              <input type="radio" name="pay" style="display:none;">
              <i class="fas fa-mobile-screen" style="color: #ffcc00; font-size: 20px; margin-bottom: 8px;"></i>
              <span style="color: #fff; font-size: 11px; font-family: 'Poppins';">JazzCash</span>
          </label>

          <label style="grid-column: span 2; display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#00d2ff';">
              <input type="radio" name="pay" style="display:none;">
              <i class="fas fa-credit-card" style="color: #00d2ff; font-size: 20px; margin-right: 15px;"></i>
              <span style="color: #fff; font-size: 11px; font-family: 'Poppins';">Credit / Debit Card</span>
              <span style="flex-grow: 1; text-align: right; color: rgba(255,255,255,0.2);"><i class="fab fa-cc-visa"></i> <i class="fab fa-cc-mastercard"></i></span>
          </label>
      </div>

      <a href="feedback.html" style="display:block; width:100%; margin-top: 30px; padding:16px; border-radius:20px; border:none; background:linear-gradient(90deg,#00d2ff,#3a7bd5); color:#fff; font-size:14px; letter-spacing:2px; font-family:'Orbitron',sans-serif; cursor:pointer; font-weight: bold; box-shadow: 0 10px 25px rgba(0,210,255,0.3); text-decoration:none; text-align:center; box-sizing:border-box;">
        PAY NOW & FINISH
      </a>

      <p style="margin-top: 20px; color: rgba(255,255,255,0.3); font-size: 10px; font-family: 'Poppins';">
          <i class="fas fa-lock"></i> SSL Encrypted & Secure Transaction
      </p>

    </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | SECURE BILLING SYSTEM
  </div>
