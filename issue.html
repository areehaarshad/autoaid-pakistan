<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | Select Issue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div style="width: 100%; max-width: 650px; display: flex; align-items: center; margin-bottom: 20px;">
        <a href="dashboard.html" style="color: #00d2ff; text-decoration: none; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px;">
            <i class="fas fa-chevron-left"></i> BACK TO MENU
        </a>
    </div>

    <div class="glass-panel">

      <span class="badge">DIAGNOSIS</span>
      <h1 class="main-title" style="font-size: 32px;">Select <span>Issue</span></h1>
      <div class="glow-line"></div>

      <div style="margin-top:30px; display: flex; flex-direction: column; gap: 15px; text-align: left;">
        
        <label style="display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#00d2ff';">
          <input type="radio" name="issue" style="display: none;">
          <i class="fas fa-car-burst" style="color: #00d2ff; font-size: 22px; margin-right: 18px; width: 30px; filter: drop-shadow(0 0 5px #00d2ff);"></i>
          <span style="color: #fff; font-family: 'Poppins'; flex-grow: 1; font-weight: 500;">Engine Problem / Breakdown</span>
          <i class="fas fa-angle-right" style="color: rgba(255,255,255,0.3); font-size: 14px;"></i>
        </label>

        <label style="display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#00d2ff';">
          <input type="radio" name="issue" style="display: none;">
          <i class="fas fa-compact-disc" style="color: #00d2ff; font-size: 22px; margin-right: 18px; width: 30px; filter: drop-shadow(0 0 5px #00d2ff);"></i>
          <span style="color: #fff; font-family: 'Poppins'; flex-grow: 1; font-weight: 500;">Flat Tire / Puncture</span>
          <i class="fas fa-angle-right" style="color: rgba(255,255,255,0.3); font-size: 14px;"></i>
        </label>

        <label style="display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#00d2ff';">
          <input type="radio" name="issue" style="display: none;">
          <i class="fas fa-fire-flame-simple" style="color: #00d2ff; font-size: 22px; margin-right: 18px; width: 30px; filter: drop-shadow(0 0 5px #00d2ff);"></i>
          <span style="color: #fff; font-family: 'Poppins'; flex-grow: 1; font-weight: 500;">Engine Overheating</span>
          <i class="fas fa-angle-right" style="color: rgba(255,255,255,0.3); font-size: 14px;"></i>
        </label>

        <label style="display: flex; align-items: center; background: rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;" onmouseover="this.style.borderColor='#00d2ff';">
          <input type="radio" name="issue" style="display: none;">
          <i class="fas fa-bolt" style="color: #00d2ff; font-size: 22px; margin-right: 18px; width: 30px; filter: drop-shadow(0 0 5px #00d2ff);"></i>
          <span style="color: #fff; font-family: 'Poppins'; flex-grow: 1; font-weight: 500;">Dead Battery / Electrical</span>
          <i class="fas fa-angle-right" style="color: rgba(255,255,255,0.3); font-size: 14px;"></i>
        </label>

      </div>

      <textarea 
        placeholder="Briefly describe the situation..."
        style="width: 100%; margin-top: 25px; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-family: 'Poppins'; font-size: 14px; outline: none; height: 90px; resize: none;"
      ></textarea>

      <a href="location.html" style="display:block; width:100%; margin-top: 25px; padding:15px; border-radius:20px; border:none; background:linear-gradient(90deg,#00d2ff,#3a7bd5); color:#fff; font-size:14px; letter-spacing:2px; font-family:'Orbitron',sans-serif; cursor:pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,210,255,0.2); text-decoration:none; text-align:center; box-sizing:border-box;">
        CONTINUE TO LOCATION
      </a>

    </div>
  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | SERVICE REQUEST
  </div>

</div>

</body>
</html>
