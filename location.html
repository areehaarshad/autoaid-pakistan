<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | Set Location</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div style="width: 100%; max-width: 650px; display: flex; align-items: center; margin-bottom: 20px;">
        <a href="issue.html" style="color: #00d2ff; text-decoration: none; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px;">
            <i class="fas fa-chevron-left"></i> BACK
        </a>
    </div>

    <div class="glass-panel" style="position: relative; overflow: hidden;">

      <span class="badge">GPS POSITIONING</span>
      <h1 class="main-title" style="font-size: 32px;">Set <span>Location</span></h1>
      <div class="glow-line"></div>

      <div style="width: 100%; height: 200px; background: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&q=80&w=1000') center center; background-size: cover; border-radius: 20px; margin-top: 25px; border: 1px solid rgba(0, 210, 255, 0.3); position: relative; box-shadow: inset 0 0 50px rgba(0,0,0,0.8);">
          <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
              <i class="fas fa-location-dot" style="color: #ff4d4d; font-size: 35px; filter: drop-shadow(0 0 10px #ff4d4d); animation: pulseGreen 2s infinite;"></i>
          </div>
          <div style="position: absolute; width: 100%; height: 2px; background: rgba(0, 210, 255, 0.5); box-shadow: 0 0 15px #00d2ff; top: 0; animation: loadingMove 3s infinite linear;"></div>
      </div>

      <div style="margin-top: 25px; text-align: left;">
        
        <button style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #00d2ff; background: rgba(0, 210, 255, 0.1); color: #00d2ff; font-family: 'Orbitron'; font-size: 11px; cursor: pointer; margin-bottom: 20px; transition: 0.3s;" onmouseover="this.style.background='rgba(0, 210, 255, 0.2)';">
            <i class="fas fa-crosshairs"></i> DETECT CURRENT LOCATION
        </button>

        <div style="margin-bottom: 15px;">
            <label style="color: rgba(255,255,255,0.5); font-size: 11px; font-family: 'Orbitron'; margin-left: 5px;">STREET / LANDMARK</label>
            <input type="text" placeholder="e.g. Near Kalma Chowk, Main Boulevard" style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.05); color:#fff; font-size:14px; outline:none; margin-top:5px;">
        </div>

        <div>
            <label style="color: rgba(255,255,255,0.5); font-size: 11px; font-family: 'Orbitron'; margin-left: 5px;">CITY</label>
            <input type="text" value="Lahore, Pakistan" readonly style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.02); color:rgba(255,255,255,0.5); font-size:14px; outline:none; margin-top:5px;">
        </div>

      </div>

      <a href="searching.html" style="display:block; width:100%; margin-top: 30px; padding:15px; border-radius:20px; border:none; background:linear-gradient(90deg,#00d2ff,#3a7bd5); color:#fff; font-size:14px; letter-spacing:2px; font-family:'Orbitron',sans-serif; cursor:pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,210,255,0.2); text-decoration:none; text-align:center; box-sizing:border-box;">
        FIND NEARBY MECHANIC
      </a>

    </div>
  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | PRECISION TRACKING ENABLED
  </div>

</div>

</body>
</html>
