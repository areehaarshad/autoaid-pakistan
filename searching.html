<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid | Searching for Mechanic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Radar Scan Animation */
    @keyframes radar-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.5); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .radar-container {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 1px solid rgba(0, 210, 255, 0.3);
      position: relative;
      margin: 40px auto;
      background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .radar-beam {
      position: absolute;
      width: 50%;
      height: 50%;
      background: linear-gradient(45deg, rgba(0, 210, 255, 0.5) 0%, transparent 100%);
      top: 0; left: 50%;
      transform-origin: bottom left;
      animation: radar-rotate 4s linear infinite;
    }

    .pulse {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid #00d2ff;
      border-radius: 50%;
      animation: pulse-ring 3s infinite;
    }

    .user-icon {
      z-index: 10;
      color: #fff;
      font-size: 30px;
      filter: drop-shadow(0 0 10px #00d2ff);
    }

    .status-text {
      font-family: 'Orbitron';
      color: #00d2ff;
      letter-spacing: 2px;
      font-size: 14px;
      margin-top: 20px;
    }

    /* Floating Icons Animation */
    @keyframes float {
      0% { transform: translateY(0px); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-100px); opacity: 0; }
    }

    .floating-tool {
      position: absolute;
      color: rgba(255,255,255,0.2);
      font-size: 20px;
      animation: float 3s infinite linear;
    }
  </style>
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div class="glass-panel" style="max-width: 500px; padding: 50px 30px; position: relative; overflow: hidden;">
      
      <i class="fas fa-wrench floating-tool" style="top: 80%; left: 20%; animation-delay: 0s;"></i>
      <i class="fas fa-screwdriver-wrench floating-tool" style="top: 70%; left: 80%; animation-delay: 1.5s;"></i>
      
      <span class="badge">NETWORK SCANNING</span>
      <h2 style="color: #fff; font-family: 'Orbitron'; font-size: 22px; margin-top: 10px;">Finding Best <span>Mechanic</span></h2>
      <p style="color: rgba(255,255,255,0.5); font-family: 'Poppins'; font-size: 12px;">Connecting with nearby service providers in Lahore...</p>

      <div class="radar-container">
          <div class="pulse"></div>
          <div class="pulse" style="animation-delay: 1s;"></div>
          <div class="radar-beam"></div>
          <i class="fas fa-car-side user-icon"></i>
      </div>

      <div class="status-text">
          <span id="loading-dots">SEARCHING</span>
      </div>

      <div style="margin-top: 40px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border-left: 4px solid #00d2ff; text-align: left;">
          <p style="color: #00d2ff; font-family: 'Orbitron'; font-size: 10px; margin: 0;">AUTO-TIP:</p>
          <p style="color: rgba(255,255,255,0.7); font-family: 'Poppins'; font-size: 11px; margin: 5px 0 0 0;">Ensure your GPS is active for 100% accuracy.</p>
      </div>

      <a href="dashboard.html" style="background: transparent; border: none; color: rgba(255,255,255,0.3); font-family: 'Orbitron'; font-size: 10px; margin-top: 30px; cursor: pointer; text-decoration: underline;">
          CANCEL SEARCH
      </a>

    </div>

  </div>

  <script>
    // Simple Dot Animation
    let dots = 0;
    const container = document.getElementById('loading-dots');
    setInterval(() => {
        dots = (dots + 1) % 4;
        container.innerText = "SEARCHING" + ".".repeat(dots);
    }, 500);

    // Auto move to assigned mechanic screen after scan completes
    setTimeout(() => {
      window.location.href = "assigned.html";
    }, 3500);
  </script>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | AI-DISPATCH ACTIVE
  </div>

</div>

</body>
</html>
