<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | Service History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content" style="max-width: 900px;">

    <div style="width: 100%; display: flex; align-items: center; margin-bottom: 20px; padding: 0 10px;">
        <a href="dashboard.html" style="color: #00d2ff; text-decoration: none; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px;">
            <i class="fas fa-arrow-left"></i> BACK TO DASHBOARD
        </a>
    </div>

    <div class="glass-panel" style="max-width: 100%; padding: 40px; text-align: left;">

      <span class="badge">ACTIVITY LOG</span>
      <h1 class="main-title" style="font-size: 32px;">Service <span>History</span></h1>
      <div class="glow-line" style="margin: 20px 0;"></div>

      <div style="overflow-x: auto; margin-top: 20px;">
          <table style="width: 100%; border-collapse: collapse; font-family: 'Poppins';">
              <thead>
                  <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                      <th style="padding: 15px; color: rgba(255,255,255,0.4); font-family: 'Orbitron'; font-size: 11px; font-weight: 400;">DATE</th>
                      <th style="padding: 15px; color: rgba(255,255,255,0.4); font-family: 'Orbitron'; font-size: 11px; font-weight: 400;">SERVICE</th>
                      <th style="padding: 15px; color: rgba(255,255,255,0.4); font-family: 'Orbitron'; font-size: 11px; font-weight: 400;">PROVIDER</th>
                      <th style="padding: 15px; color: rgba(255,255,255,0.4); font-family: 'Orbitron'; font-size: 11px; font-weight: 400;">AMOUNT</th>
                      <th style="padding: 15px; color: rgba(255,255,255,0.4); font-family: 'Orbitron'; font-size: 11px; font-weight: 400;">STATUS</th>
                  </tr>
              </thead>
              <tbody>
                  <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.03)';" onmouseout="this.style.background='transparent';">
                      <td style="padding: 20px; color: #fff; font-size: 13px;">Oct 12, 2025</td>
                      <td style="padding: 20px; color: #fff; font-size: 13px;"><i class="fas fa-truck-pickup" style="color: #00d2ff; margin-right: 8px;"></i> Towing</td>
                      <td style="padding: 20px; color: #fff; font-size: 13px;">Zahid Khan</td>
                      <td style="padding: 20px; color: #00d2ff; font-family: 'Orbitron'; font-size: 13px;">Rs. 2,500</td>
                      <td style="padding: 20px;">
                          <span style="background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron';">COMPLETED</span>
                      </td>
                  </tr>

                  <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.03)';" onmouseout="this.style.background='transparent';">
                      <td style="padding: 20px; color: #fff; font-size: 13px;">Sep 28, 2025</td>
                      <td style="padding: 20px; color: #fff; font-size: 13px;"><i class="fas fa-car-battery" style="color: #00d2ff; margin-right: 8px;"></i> Jump Start</td>
                      <td style="padding: 20px; color: #fff; font-size: 13px;">Imran Shah</td>
                      <td style="padding: 20px; color: #00d2ff; font-family: 'Orbitron'; font-size: 13px;">Rs. 800</td>
                      <td style="padding: 20px;">
                          <span style="background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron';">COMPLETED</span>
                      </td>
                  </tr>

                  <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.03)';" onmouseout="this.style.background='transparent';">
                      <td style="padding: 20px; color: #fff; font-size: 13px;">Aug 15, 2025</td>
                      <td style="padding: 20px; color: #fff; font-size: 13px;"><i class="fas fa-gas-pump" style="color: #00d2ff; margin-right: 8px;"></i> Fuel Delivery</td>
                      <td style="padding: 20px; color: #fff; font-size: 13px;">---</td>
                      <td style="padding: 20px; color: #fff; font-family: 'Orbitron'; font-size: 13px;">Rs. 0</td>
                      <td style="padding: 20px;">
                          <span style="background: rgba(255, 77, 77, 0.1); color: #ff4d4d; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-family: 'Orbitron';">CANCELLED</span>
                      </td>
                  </tr>
              </tbody>
          </table>
      </div>

      <div style="margin-top: 30px; text-align: right;">
          <button style="background: transparent; border: 1px solid rgba(0,210,255,0.5); color: #00d2ff; padding: 10px 20px; border-radius: 10px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; transition: 0.3s;" onmouseover="this.style.background='rgba(0,210,255,0.1)';">
              <i class="fas fa-file-download" style="margin-right: 8px;"></i> DOWNLOAD STATEMENT
          </button>
      </div>

    </div>

  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | ARCHIVED RECORDS
  </div>

</div>

</html>
