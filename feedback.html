<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | Service Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div class="glass-panel" style="max-width: 500px; padding: 40px;">

      <span class="badge">RATE OUR SERVICE</span>
      <h1 class="main-title" style="font-size: 28px;">Your <span>Feedback</span></h1>
      <div class="glow-line"></div>

      <p class="tagline">How was your experience with <b>Zahid Khan</b>? Your rating helps us improve.</p>

      <div style="display: flex; justify-content: center; gap: 25px; margin-top: 30px;">
          <div style="text-align: center; cursor: pointer; opacity: 0.5; transition: 0.3s;" onmouseover="this.style.opacity='1';">
              <i class="far fa-face-frown" style="font-size: 35px; color: #ff4d4d;"></i>
              <p style="color: #fff; font-size: 10px; margin-top: 5px; font-family: 'Orbitron';">SAD</p>
          </div>
          <div style="text-align: center; cursor: pointer; opacity: 0.5; transition: 0.3s;" onmouseover="this.style.opacity='1';">
              <i class="far fa-face-meh" style="font-size: 35px; color: #ffcc00;"></i>
              <p style="color: #fff; font-size: 10px; margin-top: 5px; font-family: 'Orbitron';">NEUTRAL</p>
          </div>
          <div style="text-align: center; cursor: pointer; opacity: 1;">
              <i class="far fa-face-smile-beam" style="font-size: 35px; color: #00ff88; filter: drop-shadow(0 0 10px #00ff88);"></i>
              <p style="color: #fff; font-size: 10px; margin-top: 5px; font-family: 'Orbitron';">GOOD</p>
          </div>
      </div>

      <div style="margin-top: 30px; display: flex; justify-content: center; gap: 10px; font-size: 24px; color: #ffcc00;">
          <i class="fas fa-star"></i>
          <i class="fas fa-star"></i>
          <i class="fas fa-star"></i>
          <i class="fas fa-star"></i>
          <i class="fas fa-star" style="color: rgba(255,255,255,0.1);"></i>
      </div>

      <div style="margin-top: 30px; text-align: left;">
          <label style="color: rgba(255,255,255,0.5); font-size: 11px; font-family: 'Orbitron'; margin-left: 5px;">SHARE YOUR COMMENTS</label>
          <textarea 
            placeholder="Write about the mechanic's behavior or service quality..." 
            style="width: 100%; margin-top: 10px; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-family: 'Poppins'; font-size: 14px; outline: none; height: 100px; resize: none;"
          ></textarea>
      </div>

      <a href="dashboard.html" style="display:block; width:100%; margin-top: 30px; padding:16px; border-radius:20px; border:none; background:linear-gradient(90deg,#00d2ff,#3a7bd5); color:#fff; font-size:14px; letter-spacing:2px; font-family:'Orbitron',sans-serif; cursor:pointer; font-weight: bold; box-shadow: 0 10px 25px rgba(0,210,255,0.3); text-decoration:none; text-align:center; box-sizing:border-box;">
        SUBMIT FEEDBACK
      </a>

      <a href="dashboard.html" style="display: block; margin-top: 20px; color: rgba(255,255,255,0.4); text-decoration: none; font-family: 'Orbitron'; font-size: 11px;">SKIP FOR NOW</a>

    </div>

  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | HELPING US SERVE YOU BETTER
  </div>

</div>

</body>
</html>
