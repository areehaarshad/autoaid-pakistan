<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoAid Pakistan | Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="desktop-wrapper">

  <div class="content">

    <div class="logo-wrapper">
      <div class="logo-circle">
        <img src="bg-road.png" class="logo" alt="AutoAid Logo">
      </div>
    </div>

    <div class="glass-panel" style="max-width: 700px;"> <span class="badge">JOIN THE NETWORK</span>

      <h1 class="main-title">
        Register <span>Now</span>
      </h1>

      <div class="glow-line"></div>

      <p class="tagline">
        Create your account to get instant access to 24/7 roadside 
        assistance and emergency vehicle support.
      </p>

      <form style="margin-top:30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left;" onsubmit="event.preventDefault(); window.location.href='otp.html';">
        
        <div style="grid-column: span 2;">
          <input 
            type="text" 
            placeholder="Full Name" 
            required 
            style="width:100%; padding:14px 18px; border-radius:14px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; outline:none;"
          >
        </div>

        <div style="grid-column: span 1;">
          <input 
            type="email" 
            placeholder="Email Address" 
            required 
            style="width:100%; padding:14px 18px; border-radius:14px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; outline:none;"
          >
        </div>

        <div style="grid-column: span 1;">
          <input 
            type="tel" 
            placeholder="Phone (03xx...)" 
            required 
            style="width:100%; padding:14px 18px; border-radius:14px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; outline:none;"
          >
        </div>

        <div style="grid-column: span 1;">
          <input 
            type="password" 
            placeholder="Password" 
            required 
            style="width:100%; padding:14px 18px; border-radius:14px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; outline:none;"
          >
        </div>

        <div style="grid-column: span 1;">
          <input 
            type="password" 
            placeholder="Confirm Password" 
            required 
            style="width:100%; padding:14px 18px; border-radius:14px; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; outline:none;"
          >
        </div>

        <div style="grid-column: span 2; margin-top: 10px;">
          <button
            type="submit"
            style="width:100%; padding:14px; border-radius:18px; border:none; background:linear-gradient(90deg,#00d2ff,#3a7bd5); color:#fff; font-size:14px; letter-spacing:2px; font-family:'Orbitron',sans-serif; cursor:pointer; box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);"
          >
            CREATE ACCOUNT
          </button>
        </div>

      </form>

      <div style="margin-top:25px; font-size:12px; letter-spacing:1px; color: rgba(255,255,255,0.5);">
        Already have an account? 
        <a href="login.html" style="color:#00d2ff; text-decoration:none; font-weight: 600;">Sign In</a>
      </div>

    </div>

  </div>

  <div class="footer">
    © 2025 AUTOAID PAKISTAN | MEMBERSHIP REGISTRATION
  </div>

</div>

</body>
</html>
